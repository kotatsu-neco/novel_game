<!doctype html>
<html lang="ja">
<head><meta charset="utf-8"><title>Scenario Validator</title></head>
<body>
<h1>返し鈴 Scenario Validator</h1>
<pre id="out">Loading...</pre>
<script type="module">
import { runValidator } from "../src/engine/validator.js";
const out = document.getElementById("out");
const res = await fetch("../content/scenario/main.json");
const scenario = await res.json();
const result = runValidator(scenario);
out.textContent = result.ok ? "OK" : result.errors.join("\n");
</script>
</body>
</html>
