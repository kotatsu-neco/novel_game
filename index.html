<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>返し鈴</title>
  <link rel="stylesheet" href="styles/engine.css" />

  <link rel="stylesheet" href="styles/theme.css" />

  <link rel="stylesheet" href="styles/base.css" />
  <meta name="game-title-source" content="content/manifest.json">
</head>
<body>
  <div id="app" class="app">
    <div id="stage" class="stage bg-black_rain" aria-live="polite">
      <div class="grain" aria-hidden="true"></div>
      <header class="topbar">
        <button id="btn-menu" class="small-button" type="button">メニュー</button>
        <button id="btn-save" class="small-button" type="button">保存</button>
        <button id="btn-load" class="small-button" type="button">読込</button>
        <button id="btn-sound" class="small-button" type="button">音</button>
        <button id="btn-settings" class="small-button" type="button">設定</button>
      </header>
      <main class="novel-area">
        <section id="text-window" class="text-window" role="button" tabindex="0" aria-label="本文。タップで進みます。">
          <div id="speaker" class="speaker"></div>
          <div id="text" class="text"></div>
          <div id="continue-mark" class="continue-mark">▼</div>
        </section>
        <section id="choices" class="choices hidden" aria-label="選択肢"></section>
      </main>
      <aside id="panel" class="panel hidden" aria-label="メニュー">
        <div class="panel-card">
          <h2>メニュー</h2>
          <button id="btn-backlog" type="button">バックログ</button>
          <button id="btn-restart" type="button">最初から</button>
          <button id="btn-close-panel" type="button">閉じる</button>
          <section id="settings" class="settings-panel" aria-label="表示設定">
            <h3>表示設定</h3>
            <div class="settings-columns">
              <section class="settings-column" aria-label="表示速度">
                <h4>表示速度</h4>
                <label class="setting-slider-label">本文 <span id="setting-speed-text-label" class="setting-value-label">標準</span>
                  <input id="setting-speed-text" type="range" min="0" max="4" step="1" value="2" aria-label="本文の表示速度">
                </label>
                <label class="setting-slider-label">台詞 <span id="setting-speed-voice-label" class="setting-value-label">標準</span>
                  <input id="setting-speed-voice" type="range" min="0" max="4" step="1" value="2" aria-label="台詞の表示速度">
                </label>
                <label class="setting-slider-label">文書 <span id="setting-speed-document-label" class="setting-value-label">標準</span>
                  <input id="setting-speed-document" type="range" min="0" max="4" step="1" value="2" aria-label="文書の表示速度">
                </label>
              </section>
              <section class="settings-column" aria-label="文字サイズ">
                <h4>文字サイズ</h4>
                <label>本文
                  <select id="setting-font-text">
                    <option value="small">小</option>
                    <option value="normal">標準</option>
                    <option value="large">大</option>
                  </select>
                </label>
                <label>台詞
                  <select id="setting-font-voice">
                    <option value="small">小</option>
                    <option value="normal">標準</option>
                    <option value="large">大</option>
                  </select>
                </label>
                <label>文書
                  <select id="setting-font-document">
                    <option value="small">小</option>
                    <option value="normal">標準</option>
                    <option value="large">大</option>
                  </select>
                </label>
              </section>
            </div>
            <p class="settings-note">表示速度は左がゆっくり、右が速めです。時間制限付き選択肢は、必要な場面だけシナリオ側で有効になります。</p>
          </section>
          <div id="backlog" class="backlog hidden"></div>
        </div>
      </aside>
      <div id="toast" class="toast hidden"></div>
    </div>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
